<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lifegence Drive</title>
  </head>
  <body class="font-sans antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <!--
      Jinja injection — replaced by Frappe at render time.
      frappe-ui's jinjaBootData expands the `boot` dict, but does NOT include
      csrf_token; expose it explicitly via frappe.local so frappeRequest can
      attach X-Frappe-CSRF-Token to authenticated POSTs.
      Guest sessions render "None" (stringified Python None), which we
      coerce to empty so frappeRequest treats it as missing.
    -->
    <script>
      // prettier-ignore
      window.csrf_token = "{{ frappe.local.csrf_token or '' }}";
      if (window.csrf_token === "None") window.csrf_token = "";
    </script>
  </body>
</html>
